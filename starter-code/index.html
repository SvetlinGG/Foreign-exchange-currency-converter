<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link rel="stylesheet" href="/starter-code/style/index.css">
  <title>Frontend Mentor | FX Checker</title>
</head>
<body>

  <!-- ═══ HEADER ═══ -->
  <header class="header">
    <div class="header__inner">
      <a href="/" class="header__logo">
        <img src="/starter-code/assets/images/logo.svg" alt="FX Checker">
      </a>
      <div class="header__meta" aria-label="Data source info">
        <span class="header__meta-item" id="currencyCount">-- Currencies</span>
        <span class="header__meta-sep" aria-hidden="true">·</span>
        <span class="header__meta-item">EOD</span>
        <span class="header__meta-sep" aria-hidden="true">·</span>
        <span class="header__meta-item">ECB data</span>
      </div>
    </div>
  </header>

  <!-- ═══ LIVE MARKETS TICKER ═══ -->
  <div class="ticker" aria-label="Live currency rates">
    <span class="ticker__label" aria-hidden="true">● Live Markets</span>
    <div class="ticker__track">
      <ul class="ticker__list" id="tickerList">
        <!-- Dynamic: ticker items injected by JS -->
      </ul>
    </div>
  </div>

  <!-- ═══ MAIN LAYOUT ═══ -->
  <main class="layout">

    <!-- ── LEFT COLUMN: Converter ── -->
    <div class="layout__left">
      <section class="converter" aria-labelledby="converterHeading">
        <h1 class="converter__heading" id="converterHeading">Check the rate</h1>

        <div class="converter__card">

          <!-- Send -->
          <div class="converter__field">
            <label class="converter__label" for="sendAmount">Send</label>
            <div class="converter__input-row">
              <input
                class="converter__amount"
                id="sendAmount"
                type="number"
                value="1000"
                min="0"
                aria-label="Amount to send"
              >
              <button
                class="converter__currency-btn"
                id="fromCurrencyBtn"
                aria-haspopup="dialog"
                aria-label="Select send currency"
              >
                <img class="converter__flag" id="fromFlag" src="/starter-code/assets/images/flags/us.webp" alt="">
                <span id="fromCode">USD</span>
                <img src="/starter-code/assets/images/icon-chevron-down.svg" alt="" aria-hidden="true">
              </button>
            </div>
          </div>

          <!-- Swap -->
          <button class="converter__swap" id="swapBtn" aria-label="Swap currencies">
            <img src="/starter-code/assets/images/icon-exchange-vertical.svg" alt="">
          </button>

          <!-- Receive -->
          <div class="converter__field">
            <label class="converter__label" for="receiveAmount">Receive</label>
            <div class="converter__input-row">
              <input
                class="converter__amount"
                id="receiveAmount"
                type="text"
                readonly
                aria-label="Converted amount"
                aria-live="polite"
              >
              <button
                class="converter__currency-btn"
                id="toCurrencyBtn"
                aria-haspopup="dialog"
                aria-label="Select receive currency"
              >
                <img class="converter__flag" id="toFlag" src="/starter-code/assets/images/flags/eu.webp" alt="">
                <span id="toCode">EUR</span>
                <img src="/starter-code/assets/images/icon-chevron-down.svg" alt="" aria-hidden="true">
              </button>
            </div>
          </div>

          <!-- Rate + Actions -->
          <div class="converter__footer">
            <p class="converter__rate" id="convertRate" aria-live="polite">1 USD = -- EUR</p>
            <div class="converter__actions">
              <button class="converter__favorite" id="favoriteBtn" aria-pressed="false">
                <img src="/starter-code/assets/images/icon-star.svg" alt="" aria-hidden="true">
                <span id="favoriteBtnLabel">Favorite</span>
              </button>
              <button class="converter__log" id="logBtn">
                <img src="/starter-code/assets/images/icon-arrow-right.svg" alt="" aria-hidden="true">
                Log conversion
              </button>
            </div>
          </div>

        </div>
      </section>
    </div>

    <!-- ── RIGHT COLUMN: Tabs ── -->
    <div class="layout__right">

      <!-- Tab nav -->
      <nav class="tabs" aria-label="Currency tools">
        <ul class="tabs__list" role="tablist">
          <li role="presentation">
            <button class="tabs__tab tabs__tab--active" role="tab" id="tab-history"
              aria-selected="true" aria-controls="panel-history">History</button>
          </li>
          <li role="presentation">
            <button class="tabs__tab" role="tab" id="tab-compare"
              aria-selected="false" aria-controls="panel-compare">Compare</button>
          </li>
          <li role="presentation">
            <button class="tabs__tab" role="tab" id="tab-favorites"
              aria-selected="false" aria-controls="panel-favorites">
              Favorites
              <span class="tabs__badge" id="favoritesCount" aria-label="favorited pairs"></span>
            </button>
          </li>
          <li role="presentation">
            <button class="tabs__tab" role="tab" id="tab-log"
              aria-selected="false" aria-controls="panel-log">
              Log
              <span class="tabs__badge" id="logCount" aria-label="logged conversions"></span>
            </button>
          </li>
        </ul>
      </nav>

      <!-- ── PANEL: History ── -->
      <section class="tab-panel" id="panel-history" role="tabpanel" aria-labelledby="tab-history">

        <div class="history__stats" aria-label="Rate statistics">
          <div class="history__stat">
            <span class="history__stat-label">Open</span>
            <span class="history__stat-value" id="historyOpen">--</span>
          </div>
          <div class="history__stat">
            <span class="history__stat-label">Last</span>
            <span class="history__stat-value" id="historyLast">--</span>
          </div>
          <div class="history__stat">
            <span class="history__stat-label">Change</span>
            <span class="history__stat-value" id="historyChange">--</span>
          </div>
          <div class="history__stat">
            <span class="history__stat-label">% Change</span>
            <span class="history__stat-value" id="historyPctChange">--</span>
          </div>
        </div>

        <div class="history__toolbar">
          <div class="history__pair">
            <span id="chartPair"
